<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPrice Predictor | Maisun</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            background: #f0f2f5;
            background-image: radial-gradient(#d1d9e6 1px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .main-container {
            max-width: 900px;
            margin: 40px auto;
        }

        .card-custom {
            background: var(--glass-bg);
            border: none;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .header-section {
            background: var(--primary-gradient);
            padding: 40px;
            color: white;
            text-align: center;
        }

        .header-section h2 { font-weight: 700; letter-spacing: 1px; }
        .header-section p { font-weight: 300; opacity: 0.9; }

        .form-section { padding: 40px; }

        .input-group-custom {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 15px;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }

        .input-group-custom:focus-within {
            border-color: #667eea;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .input-group-custom label {
            font-size: 0.8rem;
            color: #64748b;
            font-weight: 600;
            display: block;
            margin-bottom: 2px;
        }

        .input-group-custom input {
            border: none;
            background: transparent;
            width: 100%;
            outline: none;
            font-weight: 600;
            color: #1e293b;
        }

        .btn-predict {
            background: var(--primary-gradient);
            border: none;
            border-radius: 15px;
            padding: 15px;
            font-weight: 600;
            color: white;
            transition: transform 0.2s;
        }

        .btn-predict:hover {
            transform: translateY(-3px);
            color: white;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-reset {
            background: #fff;
            border: 2px solid #ff4757;
            color: #ff4757;
            border-radius: 15px;
            padding: 15px;
            font-weight: 600;
            text-decoration: none;
            display: block;
            text-align: center;
            transition: 0.3s;
        }

        .btn-reset:hover {
            background: #ff4757;
            color: white;
        }

        .result-card {
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            animation: slideUp 0.5s ease-out;
            color: white;
            text-align: center;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            font-size: 0.85rem;
        }

        /* Varian Warna Hasil */
        .res-0 { background: linear-gradient(135deg, #57606f 0%, #2f3542 100%); } /* Low */
        .res-1 { background: linear-gradient(135deg, #2ed573 0%, #1e90ff 100%); } /* Medium */
        .res-2 { background: linear-gradient(135deg, #ffa502 0%, #ff7f50 100%); } /* High */
        .res-3 { background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%); } /* Very High */
    </style>
</head>
<body>

<div class="container main-container">
    <div class="card card-custom">
        <div class="header-section">
            <i class="fas fa-mobile-alt fa-3x mb-3"></i>
            <h2>SMARTPHONE PREDICTOR</h2>
            <p>Klasifikasi Harga Berdasarkan Spesifikasi Teknis</p>
        </div>

        <div class="form-section">
            <form action="/predict" method="post">
                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="input-group-custom">
                            <label><i class="fas fa-memory me-2"></i>RAM (MB)</label>
                            <input type="number" name="ram" placeholder="Misal: 4096" value="{{ inputs.ram if inputs else '' }}" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group-custom">
                            <label><i class="fas fa-battery-full me-2"></i>Baterai (mAh)</label>
                            <input type="number" name="battery_power" value="{{ inputs.battery_power if inputs else '' }}" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group-custom">
                            <label><i class="fas fa-arrows-alt-v me-2"></i>Tinggi Layar (px)</label>
                            <input type="number" name="px_height" value="{{ inputs.px_height if inputs else '' }}" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group-custom">
                            <label><i class="fas fa-arrows-alt-h me-2"></i>Lebar Layar (px)</label>
                            <input type="number" name="px_width" value="{{ inputs.px_width if inputs else '' }}" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group-custom">
                            <label><i class="fas fa-hdd me-2"></i>Memori Internal (GB)</label>
                            <input type="number" name="int_memory" value="{{ inputs.int_memory if inputs else '' }}">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group-custom">
                            <label><i class="fas fa-microchip me-2"></i>Jumlah Core</label>
                            <input type="number" name="n_cores" value="{{ inputs.n_cores if inputs else '' }}">
                        </div>
                    </div>
                </div>

                <input type="hidden" name="blue" value="{{ inputs.blue if inputs else '1' }}">
                <input type="hidden" name="clock_speed" value="{{ inputs.clock_speed if inputs else '2.0' }}">
                <input type="hidden" name="dual_sim" value="{{ inputs.dual_sim if inputs else '1' }}">
                <input type="hidden" name="fc" value="{{ inputs.fc if inputs else '8' }}">
                <input type="hidden" name="four_g" value="{{ inputs.four_g if inputs else '1' }}">
                <input type="hidden" name="m_dep" value="{{ inputs.m_dep if inputs else '0.6' }}">
                <input type="hidden" name="mobile_wt" value="{{ inputs.mobile_wt if inputs else '180' }}">
                <input type="hidden" name="pc" value="{{ inputs.pc if inputs else '16' }}">
                <input type="hidden" name="sc_h" value="{{ inputs.sc_h if inputs else '15' }}">
                <input type="hidden" name="sc_w" value="{{ inputs.sc_w if inputs else '8' }}">
                <input type="hidden" name="talk_time" value="{{ inputs.talk_time if inputs else '15' }}">
                <input type="hidden" name="three_g" value="{{ inputs.three_g if inputs else '1' }}">
                <input type="hidden" name="touch_screen" value="{{ inputs.touch_screen if inputs else '1' }}">
                <input type="hidden" name="wifi" value="{{ inputs.wifi if inputs else '1' }}">

                <div class="row mt-5 g-3">
                    <div class="col-md-8">
                        <button type="submit" class="btn btn-predict w-100 shadow">
                            <i class="fas fa-magic me-2"></i>Analisis Harga HP
                        </button>
                    </div>
                    <div class="col-md-4">
                        <a href="/" class="btn btn-reset shadow-sm">
                            <i class="fas fa-trash-alt me-2"></i>Reset
                        </a>
                    </div>
                </div>
            </form>

            {% if prediction_text %}
            <div class="result-card shadow-lg 
                {% if prediction_text == 'Very High Cost' %} res-3 
                {% elif prediction_text == 'High Cost' %} res-2 
                {% elif prediction_text == 'Medium Cost' %} res-1 
                {% else %} res-0 {% endif %}">
                <h5 class="mb-1 text-uppercase fw-bold opacity-75">Prediksi Klasifikasi:</h5>
                <h1 class="display-4 fw-bold mb-0">{{ prediction_text }}</h1>
            </div>
            {% endif %}
        </div>
    </div>
    
    <div class="footer-text">
    </div>
</div>

</body>
</html>
